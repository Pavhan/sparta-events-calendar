name: Sparta scrape + publish

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sparta-ics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate docs (HTML report + ICS)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/sparta-scrape.mjs

      - name: Commit & push if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "sparta-ics-bot"
          git config user.email "sparta-ics-bot@users.noreply.github.com"

          git add docs/index.html docs/sparta.ics

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update sparta report + ics"
          git push
